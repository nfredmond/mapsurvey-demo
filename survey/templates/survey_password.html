{% extends 'base.html' %}
{% load i18n %}

{% block title %}{{ survey.name }} - {% trans "Password Required" %}{% endblock %}

{% block content %}
<div class="container" style="max-width: 460px; margin-top: 80px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="fas fa-lock fa-2x text-muted mb-3" style="display:block;"></i>
                <h4>{{ survey.name }}</h4>
                <p class="text-muted">{% trans "This survey requires a password to access." %}</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="{% trans 'Enter password' %}" autofocus required>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">{% trans "Continue" %}</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
