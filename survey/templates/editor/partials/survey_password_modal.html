<div class="mb-3">
    <strong>Password Status:</strong>
    {% if survey.has_password %}
    <span class="text-success"><i class="fas fa-check-circle"></i> Password is set</span>
    {% else %}
    <span class="text-muted"><i class="fas fa-times-circle"></i> No password set</span>
    {% endif %}
</div>

<form hx-post="{% url 'editor_survey_password' survey.uuid %}"
      hx-target="closest .password-container"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="form-group">
        <label>{% if survey.has_password %}Change{% else %}Set{% endif %} Password</label>
        <div class="input-group">
            <input type="password" name="password" class="form-control" placeholder="Enter password (min 4 chars)" minlength="4">
            <div class="input-group-append">
                <button type="submit" name="action" value="set" class="btn btn-primary">
                    {% if survey.has_password %}Change{% else %}Set{% endif %}
                </button>
            </div>
        </div>
    </div>
</form>

{% if survey.has_password %}
<form hx-post="{% url 'editor_survey_password' survey.uuid %}"
      hx-target="closest .password-container"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' class="mt-2">
    <button type="submit" name="action" value="remove" class="btn btn-sm btn-outline-danger">
        <i class="fas fa-trash"></i> Remove Password
    </button>
</form>
{% endif %}

{% if survey.status == 'testing' %}
<hr>
<div class="mb-2"><strong>Test Link</strong></div>
<div class="input-group">
    <input type="text" class="form-control form-control-sm" readonly
           id="testUrl"
           value="{{ request.scheme }}://{{ request.get_host }}/surveys/{{ survey.uuid }}/?token={{ survey.test_token }}">
    <div class="input-group-append">
        <button class="btn btn-sm btn-outline-secondary" type="button" onclick="navigator.clipboard.writeText(document.getElementById('testUrl').value)">
            <i class="fas fa-copy"></i>
        </button>
    </div>
</div>
<form hx-post="{% url 'editor_survey_password' survey.uuid %}"
      hx-target="closest .password-container"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' class="mt-2">
    <button type="submit" name="action" value="regenerate_token" class="btn btn-sm btn-outline-warning">
        <i class="fas fa-sync-alt"></i> Regenerate Token
    </button>
</form>
{% endif %}
