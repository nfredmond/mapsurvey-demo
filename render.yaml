previews:
    generation: automatic

databases:
  - name: mapsurvey-demo-db
    plan: basic-256mb
    databaseName: mapsurvey
    user: mapsurvey
    postgresMajorVersion: 16
    ipAllowList: []
    previewPlan: basic-256mb

services:
  - type: redis
    name: mapsurvey-demo-redis
    plan: free
    ipAllowList: []

  - type: web
    name: mapsurvey-demo
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mapsurvey-demo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost mapsurvey-demo.onrender.com *.onrender.com"
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: DEFAULT_FROM_EMAIL
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: DEMO_SURVEY_URL
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: GITHUB_REPO_URL
        value: "https://github.com/nfredmond/mapsurvey-demo"
      - key: CONTACT_EMAIL
        value: "info@sdbikecoalition.org"
      - key: SEED_SDBIKE_DEMO
        value: "true"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_BACKEND
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_HOST
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_PORT
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_USE_SSL
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_HOST_USER
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_HOST_PASSWORD
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: mapsurvey-demo-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: mapsurvey-demo-redis
          property: connectionString
      - key: NEWSLETTER_SITE_URL
        value: "https://mapsurvey-demo.onrender.com"
    disk:
      name: media-storage
      mountPath: /home/app/web/mediafiles
      sizeGB: 1
    healthCheckPath: /

  - type: worker
    name: mapsurvey-demo-celery
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: celery -A mapsurvey worker -l info --concurrency 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mapsurvey-demo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: mapsurvey-demo-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: mapsurvey-demo-redis
          property: connectionString
      - key: DEFAULT_FROM_EMAIL
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_BACKEND
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_HOST
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_PORT
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_USE_SSL
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_HOST_USER
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: EMAIL_HOST_PASSWORD
        sync: false
        previewEnvRenderServiceName: mapsurvey-demo
      - key: NEWSLETTER_SITE_URL
        value: "https://mapsurvey-demo.onrender.com"
