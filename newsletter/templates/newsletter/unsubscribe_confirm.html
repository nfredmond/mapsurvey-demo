<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unsubscribe — Mapsurvey</title>
</head>
<body style="margin:0;padding:0;background:#f7f5f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f7f5f2;padding:80px 20px;">
        <tr>
            <td align="center">
                <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;max-width:480px;width:100%;">
                    <tr>
                        <td style="background:#2a7f6f;padding:24px 32px;">
                            <span style="color:#ffffff;font-size:18px;font-weight:700;letter-spacing:0.5px;">Mapsurvey</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#1a1a1a;">Unsubscribe</h1>
                            <p style="margin:0 0 24px;font-size:15px;color:#6b6560;line-height:1.6;">
                                Are you sure you want to unsubscribe <strong>{{ preference.user.email }}</strong> from Mapsurvey emails?
                            </p>
                            <form method="post">
                                {% csrf_token %}
                                <button type="submit"
                                    style="display:inline-block;background:#2a7f6f;color:#ffffff;border:none;cursor:pointer;padding:12px 32px;border-radius:6px;font-size:15px;font-weight:600;">
                                    Yes, unsubscribe me
                                </button>
                            </form>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
