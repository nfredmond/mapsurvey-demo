<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f7f5f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    {% if preheader %}<span style="display:none;font-size:1px;color:#f7f5f2;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">{{ preheader }}</span>{% endif %}
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f7f5f2;padding:40px 20px;">
        <tr>
            <td align="center">
                <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;max-width:480px;width:100%;">
                    <!-- Header -->
                    <tr>
                        <td style="background:#2a7f6f;padding:24px 32px;">
                            <span style="color:#ffffff;font-size:18px;font-weight:700;letter-spacing:0.5px;">Mapsurvey</span>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:32px;">
                            {% block email_body %}{% endblock %}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding:16px 32px;border-top:1px solid #ede9e1;">
                            <p style="margin:0 0 8px;font-size:12px;color:#9ca3af;line-height:1.5;">
                                You're receiving this because you have an account on Mapsurvey.
                                <a href="{{ unsubscribe_url }}" style="color:#2a7f6f;">Unsubscribe</a>
                            </p>
                            <p style="margin:0;font-size:11px;color:#c8c2b8;line-height:1.4;">
                                {{ physical_address }}
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    {% block tracking_pixel %}<img src="{{ pixel_url }}" width="1" height="1" alt="" style="display:block;width:1px;height:1px;border:0;">{% endblock %}
</body>
</html>
